services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bettercal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bettercal"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 1g

  app:
    image: ghcr.io/ciacca123/bettercal:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "3002:3000"
    mem_limit: 1g

volumes:
  pgdata:
