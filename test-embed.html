<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Embed BetterCal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #111;
    }

    header {
      background: #111;
      color: white;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    header p  { font-size: 0.8rem; color: #aaa; }

    .hero {
      background: white;
      text-align: center;
      padding: 64px 32px 48px;
      border-bottom: 1px solid #e5e5e5;
    }
    .hero h2 { font-size: 2rem; font-weight: 700; margin-bottom: 12px; }
    .hero p  { color: #555; font-size: 1.05rem; max-width: 480px; margin: 0 auto 32px; }

    .cta {
      display: inline-block;
      background: #111;
      color: white;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
    }
    .cta:hover { background: #333; }

    .booking-section {
      max-width: 860px;
      margin: 48px auto;
      padding: 0 24px;
    }
    .booking-section h3 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
      color: #333;
    }

    .iframe-wrap {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .iframe-wrap iframe {
      width: 100%;
      height: 720px;
      border: none;
      display: block;
    }

    footer {
      text-align: center;
      padding: 32px;
      color: #aaa;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>Acme Consulting</h1>
      <p>Pagina di test embed BetterCal</p>
    </div>
  </header>

  <div class="hero">
    <h2>Parlami del tuo progetto</h2>
    <p>Prenota una call gratuita di 30 minuti. Scegli l'orario che preferisci.</p>
    <a href="#prenota" class="cta">Prenota ora →</a>
  </div>

  <div class="booking-section" id="prenota">
    <h3>Scegli data e ora</h3>
    <div class="iframe-wrap">
      <iframe
        src="http://localhost:8080/demo/intro"
        title="Prenota un appuntamento"
        loading="lazy"
        allow="clipboard-write">
      </iframe>
    </div>
  </div>

  <footer>Test embed — BetterCal running on localhost:8080</footer>

</body>
</html>
